<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>All Messages</title>
  <style>
    :root {
      --bg: #faf8f9;
      --surface: #ffffff;
      --surface-soft: #fdf7fa;
      --text: #2d1f2a;
      --muted: #7a6b76;
      --primary: #2563eb;
      --primary-soft: #dbeafe;
      --primary-dark: #1d4ed8;
      --border: #dbeafe;
      --border-soft: #e0efff;
      --success: #22c55e;
      --error: #f87171;
      --ash: #e9e7e8;
      --ash-soft: #f4f2f3;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", sans-serif;
      background: linear-gradient(135deg, #8ec5fc, #e0c3fc);
      color: white;
      display: flex;
      flex-direction: column;
    }

    .top-bar {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }

    .back-link {
      color: white;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      transition: background 0.2s ease;
    }

    .back-link:hover {
      background: rgba(255,255,255,0.15);
    }

    .top-bar-text h1 {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 700;
    }

    .top-bar-text p {
      margin: 2px 0 0;
      font-size: 0.75rem;
      opacity: 0.88;
    }

    .chat-shell {
      flex: 1;
      max-width: 680px;
      width: 100%;
      margin: 0 auto;
      padding: 16px 12px 100px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .message-row {
      display: flex;
      justify-content: flex-end;
      width: 100%;
      padding: 2px 0;
    }

    .bubble-wrap {
      max-width: 85%;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    .bubble {
      background: white;
      border-radius: 12px;
      padding: 10px 10px 8px 10px;
      position: relative;
      min-width: 120px;
      color: var(--text);
    }

    .bubble-author {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 2px;
      letter-spacing: 0.02em;
    }

    .bubble-text {
      margin: 0;
      font-size: 0.9125rem;
      line-height: 1.45;
      word-break: break-word;
      white-space: pre-wrap;
      color: var(--text);
    }

    .bubble-image {
      margin: 0 0 6px 0;
      max-width: min(280px, 100%);
      border-radius: 10px;
      overflow: hidden;
      line-height: 0;
    }

    .bubble-image img {
      width: 100%;
      height: auto;
      display: block;
      vertical-align: middle;
    }

    .bubble-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .bubble-time {
      flex: 1;
      min-width: 0;
      text-align: right;
      font-size: 0.65rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      line-height: 1.2;
    }

    .delete-btn {
      background: var(--error);
      color: white;
      border: none;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: background 0.2s ease;
    }

    .delete-btn:hover {
      filter: brightness(0.9);
    }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: rgba(255,255,255,0.85);
      font-size: 0.95rem;
    }

    .empty-state strong {
      display: block;
      color: white;
      margin-bottom: 8px;
      font-size: 1.05rem;
    }

    .bottom-actions {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 16px 20px;
      background: rgba(255,255,255,0.1);
      border-top: 1px solid rgba(255,255,255,0.2);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      max-width: 680px;
      margin: 0 auto;
    }

    a.back-btn, button {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.3);
      background: white;
      color: var(--primary);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    button.danger {
      background: var(--error);
      color: white;
      border-color: transparent;
    }

    a.back-btn:hover, button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 14px rgba(236, 72, 153, 0.15);
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background: white;
      color: var(--text);
      padding: 24px;
      border-radius: 20px;
      max-width: 460px;
      width: 92%;
      box-shadow: 0 8px 30px rgba(236, 72, 153, 0.12);
    }

    .modal-content h3 { margin-top: 0; font-weight: 700; }
    .modal-content input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 1rem;
      font-family: inherit;
    }
    .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }

    @media (max-width: 768px) {
      .top-bar { padding: 10px 12px; }
      .chat-shell { padding: 12px 10px 100px; }
    }
  </style>
</head>
<body>

<div class="top-bar">
  <a class="back-link" href="/" title="Back" aria-label="Back to send form">←</a>
  <div class="top-bar-text">
    <h1>All messages</h1>
    <p>Your conversation</p>
  </div>
</div>

<div class="chat-shell" id="messages-shell">
  <div class="empty-state" id="loading-state">
    Loading messages...
  </div>
</div>

<div id="bottom-actions-root">
  <div class="bottom-actions">
    <a href="/" class="back-btn">Back to form</a>
    <button id="adminBtn">🔑 Admin</button>
  </div>
</div>

<!-- Admin Login Modal -->
<div id="admin-modal" class="modal">
  <div class="modal-content">
    <h3>Admin Login</h3>
    <input type="password" id="admin-password" placeholder="Enter admin password">
    <div class="modal-buttons">
      <button onclick="toggleAdminModal()">Cancel</button>
      <button class="danger" onclick="adminLogin()">Login</button>
    </div>
  </div>
</div>

<script>
  let isAdmin = false;

  function escapeHtml(s) {
    if (s == null) return "";
    var d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }

  function renderBottomActions(hasMessages) {
    var root = document.getElementById("bottom-actions-root");
    if (!root) return;
    var html = '<div class="bottom-actions"><a href="/" class="back-btn">Back to form</a>';
    if (isAdmin) {
      html += '<button id="adminBtn" class="danger">🚪 Logout</button>';
    } else {
      html += '<button id="adminBtn">🔑 Admin</button>';
    }
    html += '</div>';
    root.innerHTML = html;
    
    var btn = document.getElementById("adminBtn");
    if (isAdmin) {
      btn.onclick = adminLogout;
    } else {
      btn.onclick = toggleAdminModal;
    }
  }

  function renderMessages(messages) {
    var shell = document.getElementById("messages-shell");
    if (!shell) return;

    if (!messages || messages.length === 0) {
      shell.innerHTML = '<div class="empty-state"><strong>No messages yet</strong>Send something from the home page to see it here.</div>';
      renderBottomActions(false);
      return;
    }

    var html = "";
    for (var i = 0; i < messages.length; i++) {
      var msg = messages[i];
      var name = msg.name || "";
      var body = msg.body || "";
      var timeDisplay = msg.time_display || "";
      var imageUrl = msg.image;

      html += '<div class="message-row"><div class="bubble-wrap"><div class="bubble">';
      if (name) {
        html += '<span class="bubble-author">' + escapeHtml(name) + '</span>';
      }
      if (imageUrl) {
        html += '<div class="bubble-image"><img src="' + escapeHtml(imageUrl) + '" alt="" loading="lazy" decoding="async"></div>';
      }
      if (body) {
        html += '<p class="bubble-text">' + escapeHtml(body) + '</p>';
      }
      html += '<div class="bubble-footer">';
      if (timeDisplay) {
        html += '<span class="bubble-time">' + escapeHtml(timeDisplay) + '</span>';
      }
      if (isAdmin) {
        html += '<button class="delete-btn" onclick="deleteMessage(\'' + msg.id + '\')">×</button>';
      }
      html += '</div></div></div></div>';
    }
    shell.innerHTML = html;
    renderBottomActions(true);
  }

  function refreshMessages() {
    fetch("/api/messages", { cache: "no-store" })
      .then(function (r) {
        if (!r.ok) throw new Error("Failed to load messages");
        return r.json();
      })
      .then(renderMessages)
      .catch(function (err) {
        console.error(err);
      });
  }

  async function deleteMessage(messageId) {
    if (!confirm("Are you sure you want to delete this message?")) {
      return;
    }
    
    try {
      const res = await fetch(`/api/messages/${messageId}`, {
        method: "DELETE"
      });
      
      if (!res.ok) {
        throw new Error("Failed to delete message");
      }
      
      refreshMessages();
    } catch (error) {
      console.error("Error deleting message:", error);
      alert("Failed to delete message. Please try again.");
    }
  }

  function toggleAdminModal() {
    const modal = document.getElementById("admin-modal");
    modal.style.display = modal.style.display === "flex" ? "none" : "flex";
    if (modal.style.display === "none") {
      document.getElementById("admin-password").value = "";
    }
  }

  async function adminLogin() {
    const password = document.getElementById("admin-password").value;
    
    try {
      const res = await fetch("/api/admin/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password })
      });
      
      if (!res.ok) {
        throw new Error("Incorrect password");
      }
      
      isAdmin = true;
      toggleAdminModal();
      refreshMessages();
    } catch (error) {
      alert("Incorrect password");
    }
  }

  async function adminLogout() {
    try {
      await fetch("/api/admin/logout", {
        method: "POST"
      });
      
      isAdmin = false;
      refreshMessages();
    } catch (error) {
      console.error("Error logging out:", error);
    }
  }

  // Allow closing modal by clicking outside
  document.getElementById("admin-modal").addEventListener("click", function(e) {
    if (e.target === this) {
      toggleAdminModal();
    }
  });

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", function () {
      refreshMessages();
      setInterval(refreshMessages, 5000);
    });
  } else {
    refreshMessages();
    setInterval(refreshMessages, 5000);
  }
</script>

</body>
</html>
