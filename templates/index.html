<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Board</title>

<style>
*{
box-sizing:border-box;
}
body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#8ec5fc,#e0c3fc);
margin:0;
padding:20px;
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
}

.container{
max-width:800px;
width:100%;
margin:0 auto;
flex:1;
}

h2{text-align:center;margin-bottom:20px;font-size:1.8rem;}

#top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
gap:10px;
}

#messages{
height:300px;
overflow-y:auto;
padding:15px;
background:rgba(255,255,255,0.15);
border-radius:10px;
}

.msg{
background:white;
color:black;
padding:10px;
margin-bottom:10px;
border-radius:10px;
max-width:80%;
word-wrap:break-word;
}

.highlight{
background:yellow !important;
}

.time{
font-size:12px;
color:gray;
float:right;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
font-size:1rem;
}

textarea{height:80px;resize:none;}

#send-btn{
width:100%;
padding:14px;
margin-top:10px;
background:#ffcc00;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
font-size:1rem;
}

#search-box{
margin-top:15px;
display:flex;
gap:10px;
}

#search-input{flex:1;}

button.small{
padding:10px 14px;
border:none;
border-radius:8px;
cursor:pointer;
background:white;
font-size:0.9rem;
}

/* MEDIA */
#media-panel{
display:none;
position:fixed;
right:20px;
top:80px;
width:280px;
height:400px;
background:white;
color:black;
padding:10px;
border-radius:10px;
overflow-y:auto;
z-index:999;
}

/* AI */
#ai-panel{
display:none;
position:fixed;
left:20px;
top:80px;
width:280px;
height:200px;
background:white;
color:black;
padding:10px;
border-radius:10px;
z-index:999;
}

img{
max-width:200px;
border-radius:8px;
margin-top:8px;
object-fit:cover;
}
@media (max-width: 768px){
body{padding:15px;}
h2{font-size:1.5rem;}
#messages{height:55vh;}
#media-panel,#ai-panel{
left:10px;
right:10px;
width:auto;
top:70px;
height:70vh;
}
img{max-width:100%;}
#top-bar{flex-direction:column;gap:10px;}
button.small{width:48%;}
#top-bar div{display:flex;gap:10px;width:100%;}
}
@media (max-width: 480px){
h2{font-size:1.3rem;}
.msg{max-width:90%;}
}
</style>
</head>

<body>

<div class="container">
<div id="top-bar">
<h2>💬 Chat Board</h2>

<div>
<button type="button" class="small" onclick="toggleAI()">🧠 AI</button>
<button type="button" class="small" onclick="toggleMedia()">🖼 Media</button>
</div>
</div>

<div style="text-align: center; margin-bottom: 10px;">
<a href="/all_messages" style="display: inline-block; padding: 8px 16px; background: white; color: #333; text-decoration: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
📜 View All Messages
</a>
</div>

<div id="messages"></div>

<input type="text" id="name" placeholder="Your name">
<textarea id="message" placeholder="Type message"></textarea>
<input type="file" id="image">
<button id="send-btn" type="button">Send</button>

<div id="search-box">
<input type="text" id="search-input" placeholder="Search name or date...">
<button type="button" onclick="searchMessages()">Search</button>
</div>

<!-- MEDIA -->
<div id="media-panel">
<h3>Media</h3>
<div id="media-content"></div>
</div>

<!-- AI -->
<div id="ai-panel">
<h3>AI Summary</h3>
<div id="ai-content">Click AI to load summary...</div>
</div>
</div>

<script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>

<script>
const socket = io();
const mediaPanel = document.getElementById("media-panel");
const aiPanel = document.getElementById("ai-panel");

/* Close panels when clicking outside */
document.addEventListener("click", function(e) {
    if (mediaPanel.style.display === "block" && 
        !mediaPanel.contains(e.target) && 
        !e.target.closest('[onclick="toggleMedia()"]')) {
        toggleMedia();
    }
    if (aiPanel.style.display === "block" && 
        !aiPanel.contains(e.target) && 
        !e.target.closest('[onclick="toggleAI()"]')) {
        toggleAI();
    }
});

/* SEND */
document.getElementById("send-btn").onclick = function () {

const username = document.getElementById("name").value || "Anonymous";
const message = document.getElementById("message").value;
const imageFile = document.getElementById("image").files[0];

if (!message.trim() && !imageFile) return;

if (imageFile) {
const reader = new FileReader();

reader.onload = function () {
socket.emit("send_message", {
username,
message,
image: reader.result
});
};

reader.readAsDataURL(imageFile);
} else {
socket.emit("send_message", {
username,
message,
image: null
});
}

document.getElementById("message").value = "";
document.getElementById("image").value = "";
};

/* LOAD */
window.onload = function () {
fetch("/api/messages")
.then(res => res.json())
.then(data => {

const box = document.getElementById("messages");
const media = document.getElementById("media-content");

box.innerHTML = "";
media.innerHTML = "";

data.forEach(msg => {

let div = document.createElement("div");
div.className = "msg";

div.innerHTML = `
<b>${msg.name}</b><br>
${msg.body}<br>
<span class="time">${msg.time_display}</span>
`;

if (msg.image_url) {
div.innerHTML += `<br><img src="${msg.image_url}">`;
media.innerHTML += `<img src="${msg.image_url}"><br>`;
}

box.appendChild(div);
});
});
};

/* LIVE */
socket.on("receive_message", function (data) {

const box = document.getElementById("messages");
const media = document.getElementById("media-content");

let div = document.createElement("div");
div.className = "msg";

div.innerHTML = `
<b>${data.username}</b><br>
${data.message}<br>
<span class="time">${data.time}</span>
`;

if (data.image_url) {
div.innerHTML += `<br><img src="${data.image_url}">`;
media.innerHTML += `<img src="${data.image_url}">`;
}

box.appendChild(div);
box.scrollTop = box.scrollHeight;
});

/* SEARCH */
function searchMessages(){

const query = document.getElementById("search-input").value.toLowerCase();
const msgs = document.querySelectorAll(".msg");

msgs.forEach(msg => {
msg.classList.remove("highlight");

if(query && msg.innerText.toLowerCase().includes(query)){
msg.scrollIntoView({behavior:"smooth", block:"center"});
msg.classList.add("highlight");
}
});
}

/* 🔥 FIXED AI (RESET PROPERLY) */
function toggleAI(){
const panel = document.getElementById("ai-panel");
const content = document.getElementById("ai-content");

if(panel.style.display === "block"){
panel.style.display = "none";
content.innerText = "Click AI to load summary...";
return;
}

panel.style.display = "block";
content.innerText = "Loading AI summary...";

fetch("/ai_summary")
.then(res => res.json())
.then(data => {
content.innerHTML = data.summary.replace(/\n/g, "<br>");
});
}

/* 🔥 FIXED MEDIA (RESET PROPERLY) */
function toggleMedia(){
const panel = document.getElementById("media-panel");
const content = document.getElementById("media-content");

if(panel.style.display === "block"){
panel.style.display = "none";
content.innerHTML = "";
return;
}

panel.style.display = "block";
}
</script>

</body>
</html>
