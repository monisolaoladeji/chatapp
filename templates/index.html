<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Board</title>
<style>
  :root {
    --bg: #faf8f9;
    --surface: #ffffff;
    --surface-soft: #fdf7fa;
    --text: #2d1f2a;
    --muted: #7a6b76;
    --primary: #2563eb;
    --primary-soft: #dbeafe;
    --primary-dark: #1d4ed8;
    --border: #dbeafe;
    --border-soft: #e0efff;
    --success: #22c55e;
    --error: #f87171;
    --ash: #e9e7e8;
    --ash-soft: #f4f2f3;
  }

  * { box-sizing: border-box; }
  body {
    font-family: "Inter", sans-serif;
    background: linear-gradient(135deg, #8ec5fc, #e0c3fc);
    margin: 0;
    padding: 20px;
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .container { max-width: 800px; width: 100%; margin: 0 auto; flex: 1; }
  h2 { text-align: center; margin-bottom: 20px; font-size: 1.8rem; font-weight: 700; }
  #top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 10px; }
  #messages {
    height: 300px;
    overflow-y: auto;
    padding: 15px;
    background: rgba(255,255,255,0.15);
    border-radius: 16px;
  }
  .msg {
    background: white;
    color: var(--text);
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 12px;
    max-width: 80%;
    word-wrap: break-word;
    position: relative;
  }
  .delete-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--error);
    color: white;
    border: none;
    border-radius: 50%;
    width: 24px;
    height: 24px;
    font-size: 14px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .msg:hover .delete-btn { display: flex; }
  .time { font-size: 12px; color: var(--muted); float: right; }
  input, textarea {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: 2px solid var(--border);
    background: white;
    color: var(--text);
    border-radius: 12px;
    font-size: 1rem;
    font-family: inherit;
  }
  textarea { height: 80px; resize: none; }
  #send-btn {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    background: linear-gradient(135deg, #2563eb 0%, #db2777 100%);
    color: white;
    border: none;
    border-radius: 12px;
    font-weight: 700;
    cursor: pointer;
    font-size: 1rem;
    box-shadow: 0 4px 16px rgba(37, 99, 235, 0.4), 0 4px 14px rgba(236, 72, 153, 0.35);
  }
  #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  #search-box { margin-top: 15px; display: flex; gap: 10px; }
  button.small {
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    background: white;
    color: var(--text);
    font-size: 0.9rem;
    font-family: inherit;
  }
  #media-panel {
    display: none;
    position: fixed;
    right: 20px;
    top: 80px;
    width: 280px;
    height: 400px;
    background: white;
    color: var(--text);
    padding: 10px;
    border-radius: 16px;
    overflow-y: auto;
    z-index: 999;
  }
  #ai-panel {
    display: none;
    position: fixed;
    left: 20px;
    top: 80px;
    width: 280px;
    height: 200px;
    background: white;
    color: var(--text);
    padding: 10px;
    border-radius: 16px;
    z-index: 999;
  }
  img { max-width: 200px; border-radius: 10px; margin-top: 8px; object-fit: cover; }

  .site-footer {
    margin-top: 3rem;
    padding: 2rem 0;
    border-top: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.1);
    border-radius: 16px;
  }
  .site-footer p {
    color: rgba(255,255,255,0.85);
    text-align: center;
    font-size: 0.95rem;
    margin: 0;
  }
  .admin-link {
    display: inline-block;
    margin-top: 0.6rem;
    color: rgba(255,255,255,0.7);
    text-decoration: none;
    font-size: 0.85rem;
    opacity: 0.75;
    transition: all 0.2s ease;
    border-bottom: 1px solid transparent;
    cursor: pointer;
  }
  .admin-link:hover {
    opacity: 1;
    color: white;
    border-bottom-color: white;
  }

  .modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
    z-index: 1000;
  }
  .modal-content {
    background: white;
    color: var(--text);
    padding: 24px;
    border-radius: 20px;
    max-width: 460px;
    width: 92%;
    box-shadow: 0 8px 30px rgba(236, 72, 153, 0.12);
  }
  .modal-content h3 { margin-top: 0; font-weight: 700; }
  .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
  .btn {
    border: none;
    border-radius: 12px;
    padding: 0.8rem 1.4rem;
    text-decoration: none;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    transition: all 0.25s ease;
    font-size: 0.95rem;
    font-family: inherit;
  }
  .btn-primary {
    background: linear-gradient(135deg, #2563eb 0%, #db2777 100%);
    color: white !important;
    font-weight: 700 !important;
    box-shadow: 0 4px 16px rgba(37, 99, 235, 0.4), 0 4px 14px rgba(236, 72, 153, 0.35);
  }
  .btn-outline {
    background: transparent;
    border: 2px solid var(--border);
    color: var(--text);
  }

  @media (max-width: 768px) {
    body { padding: 15px; }
    h2 { font-size: 1.5rem; }
    #messages { height: 55vh; }
    #media-panel, #ai-panel { left: 10px; right: 10px; width: auto; top: 70px; height: 70vh; }
    img { max-width: 100%; }
    #top-bar { flex-direction: column; gap: 10px; }
    button.small { width: 48%; }
    #top-bar div { display: flex; gap: 10px; width: 100%; }
  }
</style>
</head>
<body>

<div class="container">
  <div id="top-bar">
    <h2>💬 Chat Board</h2>
    <div>
      <button type="button" class="small" onclick="toggleAI()">🧠 AI</button>
      <button type="button" class="small" onclick="toggleMedia()">🖼 Media</button>
    </div>
  </div>

  <div style="text-align: center; margin-bottom: 10px;">
    <a href="/all_messages" style="display: inline-block; padding: 8px 16px; background: white; color: var(--text); text-decoration: none; border-radius: 12px; font-weight: 600; cursor: pointer;">
      📜 View All Messages
    </a>
  </div>

  <div id="messages"></div>

  <input type="text" id="name" placeholder="Your name">
  <textarea id="message" placeholder="Type message"></textarea>
  <input type="file" id="image" accept="image/*">
  <button id="send-btn" type="button">Send</button>

  <div id="search-box">
    <input type="text" id="search-input" placeholder="Search name or date...">
    <button type="button" class="small" onclick="searchMessages()">Search</button>
  </div>

  <div class="site-footer">
    <p>&copy; <span id="year"></span> Chat Board. All rights reserved.<br><a id="adminLink" class="admin-link">Admin</a></p>
  </div>

  <div id="media-panel"><h3 style="margin-top: 0;">Media</h3><div id="media-content"></div></div>
  <div id="ai-panel"><h3 style="margin-top: 0;">AI Summary</h3><div id="ai-content">Click AI to load summary...</div></div>
</div>

<!-- Admin Login Modal -->
<div id="admin-modal" class="modal">
  <div class="modal-content">
    <h3>Admin Login</h3>
    <input type="password" id="admin-password" placeholder="Enter admin password">
    <div class="modal-buttons">
      <button type="button" class="btn btn-outline" onclick="toggleAdminModal()">Cancel</button>
      <button type="button" class="btn btn-primary" onclick="adminLogin()">Login</button>
    </div>
  </div>
</div>

<script>
  let allMessages = [];
  let mediaImages = new Set();
  let isAdmin = false;

  function renderMessage(data, scroll) {
    const box = document.getElementById("messages");
    const media = document.getElementById("media-content");
    
    const name = data.username || data.name || "Anonymous";
    const body = data.message || data.body || "";
    const time = data.time || data.time_display || "";
    const img = data.image;

    let div = document.createElement("div");
    div.className = "msg";
    div.innerHTML = `<b>${name}</b><br>${body}<br><span class="time">${time}</span>`;
    
    if (img) {
      div.innerHTML += `<br><img src="${img}">`;
      if (!mediaImages.has(img.substring(0, 50))) {
        mediaImages.add(img.substring(0, 50));
        media.innerHTML += `<img src="${img}"><br>`;
      }
    }
    
    if (isAdmin) {
      const deleteBtn = document.createElement("button");
      deleteBtn.className = "delete-btn";
      deleteBtn.innerHTML = "×";
      deleteBtn.onclick = () => deleteMessage(data.id);
      div.appendChild(deleteBtn);
    }

    box.appendChild(div);
    if(scroll) box.scrollTop = box.scrollHeight;
  }

  function loadMessages() {
    fetch("/api/messages")
      .then(res => res.json())
      .then(data => {
        allMessages = data;
        const box = document.getElementById("messages");
        box.innerHTML = "";
        data.forEach(msg => renderMessage(msg, false));
        box.scrollTop = box.scrollHeight;
      }).catch(err => console.error("Error loading messages:", err));
  }

  async function sendMessage() {
    const sendBtn = document.getElementById("send-btn");
    sendBtn.disabled = true;
    
    const username = document.getElementById("name").value.trim() || "Anonymous";
    const message = document.getElementById("message").value.trim();
    const imageInput = document.getElementById("image");
    const imageFile = imageInput.files[0];

    if (!message && !imageFile) {
      sendBtn.disabled = false;
      return;
    }

    try {
      let payload = { username, message, image: null };
      
      if (imageFile) {
        const reader = new FileReader();
        const imageData = await new Promise((resolve, reject) => {
          reader.onload = (e) => resolve(e.target.result);
          reader.onerror = reject;
          reader.readAsDataURL(imageFile);
        });
        payload.image = imageData;
      }
      
      const res = await fetch("/api/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      
      if (!res.ok) {
        throw new Error("Failed to send message");
      }
      
      const newMsg = await res.json();
      renderMessage(newMsg, true);
      document.getElementById("message").value = "";
      imageInput.value = "";
    } catch (error) {
      console.error("Error sending message:", error);
      alert("Failed to send message. Please try again.");
    } finally {
      sendBtn.disabled = false;
    }
  }

  async function deleteMessage(messageId) {
    if (!confirm("Are you sure you want to delete this message?")) {
      return;
    }
    
    try {
      const res = await fetch(`/api/messages/${messageId}`, {
        method: "DELETE"
      });
      
      if (!res.ok) {
        throw new Error("Failed to delete message");
      }
      
      loadMessages();
    } catch (error) {
      console.error("Error deleting message:", error);
      alert("Failed to delete message. Please try again.");
    }
  }

  function toggleAdminModal() {
    const modal = document.getElementById("admin-modal");
    modal.style.display = modal.style.display === "flex" ? "none" : "flex";
    if (modal.style.display === "none") {
      document.getElementById("admin-password").value = "";
    }
  }

  async function adminLogin() {
    const password = document.getElementById("admin-password").value;
    
    try {
      const res = await fetch("/api/admin/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password })
      });
      
      if (!res.ok) {
        throw new Error("Incorrect password");
      }
      
      isAdmin = true;
      updateAdminLink();
      toggleAdminModal();
      loadMessages();
    } catch (error) {
      alert("Incorrect password");
    }
  }

  async function adminLogout() {
    try {
      await fetch("/api/admin/logout", {
        method: "POST"
      });
      
      isAdmin = false;
      updateAdminLink();
      loadMessages();
    } catch (error) {
      console.error("Error logging out:", error);
    }
  }

  function updateAdminLink() {
    const link = document.getElementById("adminLink");
    if (isAdmin) {
      link.textContent = "Admin Logout";
      link.onclick = adminLogout;
    } else {
      link.textContent = "Admin";
      link.onclick = toggleAdminModal;
    }
  }

  document.getElementById("send-btn").addEventListener("click", sendMessage);

  // Allow sending with Enter key
  document.getElementById("message").addEventListener("keypress", function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Allow closing modal by clicking outside
  document.getElementById("admin-modal").addEventListener("click", function(e) {
    if (e.target === this) {
      toggleAdminModal();
    }
  });

  // Poll for new messages every 3 seconds
  setInterval(loadMessages, 3000);

  window.onload = function () {
    document.getElementById("year").textContent = new Date().getFullYear();
    loadMessages();
    updateAdminLink();
  };

  function toggleAI() {
    const panel = document.getElementById("ai-panel");
    const content = document.getElementById("ai-content");
    if(panel.style.display === "block") { panel.style.display = "none"; return; }
    panel.style.display = "block";
    content.innerText = "Loading AI summary...";
    fetch("/ai_summary").then(res => res.json()).then(data => {
      content.innerHTML = data.summary ? data.summary.replace(/\n/g, "<br>") : "No summary available";
    }).catch(() => content.innerText = "AI summary unavailable.");
  }

  function toggleMedia() {
    const panel = document.getElementById("media-panel");
    panel.style.display = (panel.style.display === "block") ? "none" : "block";
  }

  function searchMessages() {
    const query = document.getElementById("search-input").value.toLowerCase();
    document.querySelectorAll(".msg").forEach(msg => {
      msg.style.background = query && msg.innerText.toLowerCase().includes(query) ? "yellow" : "white";
      if (query && msg.innerText.toLowerCase().includes(query)) {
        msg.scrollIntoView({behavior:"smooth", block:"center"});
      }
    });
  }
</script>
</body>
</html>
