<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Board</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #6a11cb, #2575fc);
        margin: 0;
        padding: 20px;
        color: white;
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    #messages {
        height: 300px;
        overflow-y: auto;
        border: none;
        padding: 15px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 10px;
        backdrop-filter: blur(5px);
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    #messages div {
        background: white;
        color: black;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 10px;
        max-width: 80%;
        word-wrap: break-word;
    }

    input, textarea {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border-radius: 8px;
        border: none;
        outline: none;
    }

    textarea {
        resize: none;
        height: 80px;
    }

    #send-btn {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        background: #ffcc00;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    #send-btn:hover {
        background: #ffdb4d;
        transform: scale(1.02);
    }

    img {
        margin-top: 8px;
        border-radius: 8px;
        max-width: 100%;
    }
input[type="file"]::file-selector-button {
       margin_right: 12px;
       padding: 10px 16px;
       border: none;
       border-radius: 10px;
       colour: white;
       font-weight: 600;
       cursor: pointer;
       transition: 0.2s;
}
input[type="file"::file-selector-button:hover {
     background: #0e6f66;
}
</style>

</head>

<body>

<h2>💬 Chat Board</h2>

<div id="messages"></div>

<input type="text" id="name" placeholder="Your name" required>

<textarea id="message" placeholder="Type message"></textarea>

<input type="file" id="image">

<button id="send-btn">Send</button>

<script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>

<script>
const socket = io();

// SEND MESSAGE
document.getElementById("send-btn").addEventListener("click", function () {
    const username = document.getElementById("name").value || "Anonymous";
    const message = document.getElementById("message").value;

    if (!message.trim()) return;

    socket.emit("send_message", {
        username: username,
        message: message
    });

    document.getElementById("message").value = "";
});

// RECEIVE MESSAGE
socket.on("receive_message", function (data) {
    const messagesDiv = document.getElementById("messages");

    const msg = document.createElement("div");

    let content = `<b>${data.username}:</b><br>${data.message}`;

    if (data.image_url) {
        content += `<br><img src="${data.image_url}">`;
    }

    msg.innerHTML = content;

    messagesDiv.appendChild(msg);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
});
</script>

</body>
</html>
